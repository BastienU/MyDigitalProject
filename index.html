<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oh my tag !</title>
</head>
<body>

    <h1>
        Take your picture
    </h1>
    <br>
    <p>Click on the following button to take your picture</p>
    <input
      type="file"
      id="environment"
      capture="environment"
      accept="photo/*"
    >
    <br><br>

    <p>Or click on this button to take a selfie</p>
    <label for="user">Capture user:</label>
    <br>
    <input
      type="file"
      id="user"
      capture="user"
      accept="image/*"
    >
</body>
</html>
