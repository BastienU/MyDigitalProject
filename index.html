<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oh my tag !</title>
</head>
<body>
    <label for="environment">Capture environment:</label>
    <br>
    <input
      type="file"
      id="environment"
      capture="environment"
      accept="video/*"
    >
    <br><br>
    <label for="user">Capture user:</label>
    <br>
    <input
      type="file"
      id="user"
      capture="user"
      accept="image/*"
    >
</body>
</html>
